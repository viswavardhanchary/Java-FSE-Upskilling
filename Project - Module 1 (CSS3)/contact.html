	<title>Local Community Event Portal - Contact</title>
	<style>
    main {
      display: flex;
      align-items: center;
      justify-content: center;

    }
		.highlight {
			background-color: yellow;
			color: black;
			padding: 0 4px;
			border-radius: 2px;
			text-align: center;
		}

		.imageFormat {
			border: 1px solid gray;
			width: 200px;
			height: 200px;
		}

		.tableFormater td,
		th {
			border: 1px solid gray;
			border-radius: 3px;
			padding: 8px;
		}

		#events {
			display: flex;
			align-items: center;
			justify-content: center;
			flex-direction: column;
		}

		.tableRowFormater {
			border: 1px solid gray;
			padding: 3px;
		}

		.headerNav {
			background-color: black;
			padding: 5px;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 1rem;
		}

		.headerNav a {
			color: white;
			text-decoration: none;

		}

		.headerNav a:hover {
			text-decoration: underline;
		}

		#welcomeBanner {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 10px;
			flex-direction: column;
		}

		.formFormater {
			display: flex;
			gap: 8px;
			flex-direction: column;
			width: 100%;
		}

		.formFormater input,
		textarea,
		select {
			padding: 3px;
			font-size: 16px;
			border: 1px solid orange;
		}

		#register,
		#feedback {
			display: flex;
			justify-content: center;
			align-items: center;
			flex-direction: column;
			/* width: 100%; */
			padding: 15px;
		}

		.submitFormater {
			background-color: green;

		}

		.submitFormater:hover {
			background-color: rgb(58, 161, 58);
			cursor: pointer;
		}

		footer {
			background-color: rgb(235, 201, 52);
			padding: 5px;
			text-align: center;
			margin-top: 10px;
		}
	</style>
